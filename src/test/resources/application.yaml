spring:
  datasource:
    url: jdbc:h2:mem:ssairen;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

ssairen:
  websocket:
    allowed-origins: "*"
  transcript:
    analysis-threshold-characters: 1000
