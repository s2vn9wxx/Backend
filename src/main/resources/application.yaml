spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

ssairen:
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}
  analysis:
    provider: ${SSAIREN_ANALYSIS_PROVIDER:openai}
    openai:
      model: ${OPENAI_ANALYSIS_MODEL:gpt-4o}
      prompt: ${OPENAI_ANALYSIS_PROMPT:당신은 보이스피싱 탐지 보조 AI입니다. 입력된 통화 텍스트를 분석한 뒤 JSON만 반환하세요. 필드는 riskScore(0~100 정수), phishingType(AGENCY_IMPERSONATION|ACCOUNT_TRANSFER_INDUCEMENT|KIDNAPPING_THREAT|REMOTE_APP_INSTALLATION|UNKNOWN), aiSummary(문자열), keywords(문자열 배열) 입니다.}
    fastapi:
      url: ${SSAIREN_FASTAPI_URL:http://localhost:8000}
      path: ${SSAIREN_FASTAPI_ANALYSIS_PATH:/api/v1/transcript-analysis}
  transcript:
    analysis-threshold-characters: ${TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS:1000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

server:
  address: 0.0.0.0
  port: 8080
