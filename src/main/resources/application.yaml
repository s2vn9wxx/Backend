spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

ssairen:
  websocket:
    allowed-origins: "*"
  analysis:
    provider: ${SSAIREN_ANALYSIS_PROVIDER:mock-open-api}
    websocket-escalation-threshold: ${SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD:70}
    fastapi:
      url: ${SSAIREN_FASTAPI_URL:http://localhost:8000}
      rest-path: ${SSAIREN_FASTAPI_REST_ANALYSIS_PATH:/api/v1/call-analysis/rest}
      websocket-path: ${SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH:/api/v1/call-analysis/websocket}
    mock-open-api:
      base-url: ${SSAIREN_MOCK_OPEN_API_BASE_URL:https://api.openai.com}
      chat-path: ${SSAIREN_MOCK_OPEN_API_CHAT_PATH:/v1/chat/completions}
      api-key: ${SSAIREN_MOCK_OPEN_API_API_KEY:}
      model: ${SSAIREN_MOCK_OPEN_API_MODEL:gpt-4o-mini}
  transcript:
    analysis-threshold-characters: ${TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS:1000}
  fcm:
    enabled: ${FCM_ENABLED}
    credentials-path: ${FCM_CREDENTIALS_PATH}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

server:
  port: 8080
  forward-headers-strategy: framework
