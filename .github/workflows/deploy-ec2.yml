name: Deploy Backend To EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build application
        run: |
          chmod +x ./gradlew
          ./gradlew clean build
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Executable jar not found in build/libs"
            exit 1
          fi
          cp "$JAR_FILE" app.jar

      - name: Copy artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          source: "app.jar"
          target: ${{ secrets.EC2_DEPLOY_PATH }}

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          WEBSOCKET_ALLOWED_ORIGINS: ${{ secrets.WEBSOCKET_ALLOWED_ORIGINS }}
          SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD: ${{ secrets.SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD }}
          SSAIREN_FASTAPI_URL: ${{ secrets.SSAIREN_FASTAPI_URL }}
          SSAIREN_FASTAPI_REST_ANALYSIS_PATH: ${{ secrets.SSAIREN_FASTAPI_REST_ANALYSIS_PATH }}
          SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH: ${{ secrets.SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH }}
          SSAIREN_ANALYSIS_PROVIDER: ${{ secrets.SSAIREN_ANALYSIS_PROVIDER }}
          SSAIREN_MOCK_OPEN_API_BASE_URL: ${{ secrets.SSAIREN_MOCK_OPEN_API_BASE_URL }}
          SSAIREN_MOCK_OPEN_API_CHAT_PATH: ${{ secrets.SSAIREN_MOCK_OPEN_API_CHAT_PATH }}
          SSAIREN_MOCK_OPEN_API_API_KEY: ${{ secrets.SSAIREN_MOCK_OPEN_API_API_KEY }}
          SSAIREN_MOCK_OPEN_API_MODEL: ${{ secrets.SSAIREN_MOCK_OPEN_API_MODEL }}
          TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS: ${{ secrets.TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: DB_URL,DB_NAME,DB_USER,DB_PASSWORD,WEBSOCKET_ALLOWED_ORIGINS,SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD,SSAIREN_FASTAPI_URL,SSAIREN_FASTAPI_REST_ANALYSIS_PATH,SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH,SSAIREN_ANALYSIS_PROVIDER,SSAIREN_MOCK_OPEN_API_BASE_URL,SSAIREN_MOCK_OPEN_API_CHAT_PATH,SSAIREN_MOCK_OPEN_API_API_KEY,SSAIREN_MOCK_OPEN_API_MODEL,TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            ENV_FILE="$DEPLOY_PATH/.env"
            PID_FILE="$DEPLOY_PATH/app.pid"
            LOG_FILE="$DEPLOY_PATH/app.log"
            APP_FILE="$DEPLOY_PATH/app.jar"

            mkdir -p "$DEPLOY_PATH"

            cat <<EOF > "$ENV_FILE"
            DB_URL=$DB_URL
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            WEBSOCKET_ALLOWED_ORIGINS=${WEBSOCKET_ALLOWED_ORIGINS:-*}
            SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD=${SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD:-70}
            SSAIREN_FASTAPI_URL=${SSAIREN_FASTAPI_URL:-http://localhost:8000}
            SSAIREN_FASTAPI_REST_ANALYSIS_PATH=${SSAIREN_FASTAPI_REST_ANALYSIS_PATH:-/api/v1/call-analysis/rest}
            SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH=${SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH:-/api/v1/call-analysis/websocket}
            SSAIREN_ANALYSIS_PROVIDER=${SSAIREN_ANALYSIS_PROVIDER:-mock-open-api}
            SSAIREN_MOCK_OPEN_API_BASE_URL=${SSAIREN_MOCK_OPEN_API_BASE_URL:-https://api.openai.com}
            SSAIREN_MOCK_OPEN_API_CHAT_PATH=${SSAIREN_MOCK_OPEN_API_CHAT_PATH:-/v1/chat/completions}
            SSAIREN_MOCK_OPEN_API_API_KEY=$SSAIREN_MOCK_OPEN_API_API_KEY
            SSAIREN_MOCK_OPEN_API_MODEL=${SSAIREN_MOCK_OPEN_API_MODEL:-gpt-4o-mini}
            TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS=${TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS:-1000}
            EOF

            if [ -f "$PID_FILE" ] && kill -0 "$(cat "$PID_FILE")" 2>/dev/null; then
              kill "$(cat "$PID_FILE")"
              sleep 10
            fi

            pkill -f "$APP_FILE" || true

            cd "$DEPLOY_PATH"
            set -a
            . "$ENV_FILE"
            set +a
            nohup java -jar "$APP_FILE" > "$LOG_FILE" 2>&1 &
            echo $! > "$PID_FILE"
            sleep 10

            if ! kill -0 "$(cat "$PID_FILE")" 2>/dev/null; then
              echo "Application failed to start. Last log lines:"
              tail -n 100 "$LOG_FILE" || true
              exit 1
            fi
