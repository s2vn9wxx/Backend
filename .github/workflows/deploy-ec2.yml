name: Deploy Backend To EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build application
        run: |
          chmod +x ./gradlew
          ./gradlew clean build
          cp build/libs/*.jar app.jar

      - name: Copy artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          source: "app.jar"
          target: ${{ secrets.EC2_DEPLOY_PATH }}

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          WEBSOCKET_ALLOWED_ORIGINS: ${{ secrets.WEBSOCKET_ALLOWED_ORIGINS }}
          SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD: ${{ secrets.SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD }}
          SSAIREN_FASTAPI_URL: ${{ secrets.SSAIREN_FASTAPI_URL }}
          SSAIREN_FASTAPI_REST_ANALYSIS_PATH: ${{ secrets.SSAIREN_FASTAPI_REST_ANALYSIS_PATH }}
          SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH: ${{ secrets.SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH }}
          TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS: ${{ secrets.TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: DB_URL,DB_NAME,DB_USER,DB_PASSWORD,WEBSOCKET_ALLOWED_ORIGINS,SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD,SSAIREN_FASTAPI_URL,SSAIREN_FASTAPI_REST_ANALYSIS_PATH,SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH,TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            ENV_FILE="$DEPLOY_PATH/.env"
            PID_FILE="$DEPLOY_PATH/app.pid"
            LOG_FILE="$DEPLOY_PATH/app.log"
            APP_FILE="$DEPLOY_PATH/app.jar"

            mkdir -p "$DEPLOY_PATH"

            cat <<EOF > "$ENV_FILE"
            DB_URL=$DB_URL
            DB_NAME=$DB_NAME
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            WEBSOCKET_ALLOWED_ORIGINS=$WEBSOCKET_ALLOWED_ORIGINS
            SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD=$SSAIREN_WEBSOCKET_ESCALATION_THRESHOLD
            SSAIREN_FASTAPI_URL=$SSAIREN_FASTAPI_URL
            SSAIREN_FASTAPI_REST_ANALYSIS_PATH=$SSAIREN_FASTAPI_REST_ANALYSIS_PATH
            SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH=$SSAIREN_FASTAPI_WEBSOCKET_ANALYSIS_PATH
            TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS=$TRANSCRIPT_ANALYSIS_THRESHOLD_CHARACTERS
            EOF

            if [ -f "$PID_FILE" ] && kill -0 "$(cat "$PID_FILE")" 2>/dev/null; then
              kill "$(cat "$PID_FILE")"
              sleep 10
            fi

            pkill -f "$APP_FILE" || true

            cd "$DEPLOY_PATH"
            set -a
            . "$ENV_FILE"
            set +a
            nohup java -jar "$APP_FILE" > "$LOG_FILE" 2>&1 &
            echo $! > "$PID_FILE"
